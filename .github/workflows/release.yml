name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - "src/version.ts"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Read version
        id: ver
        run: |
          VERSION=$(grep -oP '"\K[0-9]+\.[0-9]+\.[0-9]+(?=")' src/version.ts | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check tag does not exist
        id: tagcheck
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: LM 4Z initializer ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/lm-4z-init-${{ steps.ver.outputs.version }}.html
            dist/index.html
