<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>LM 4Z initializer</title>
    <meta name="description" content="Обертка над локальным API ЛМ ЧЗ — инициализация и мониторинг статуса" />
    <style>
      html, body { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      body { -webkit-tap-highlight-color: rgba(0,0,0,0); margin: 0; }
      /* safe area for notch phones */
      body { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
      /* prevent iOS auto-zoom on inputs (font-size < 16px triggers zoom) */
      @media (max-width: 640px) {
        input, select, textarea { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
